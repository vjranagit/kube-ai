apiVersion: v1
kind: Service
metadata:
  name: vllm-service
  namespace: kube-ai
  labels:
    app: vllm-server
spec:
  type: NodePort
  selector:
    app: vllm-server
  ports:
    - name: http
      protocol: TCP
      port: 8000
      targetPort: 8000
      # NodePort 30080 is mapped to host port 30080 in infra/kind/cluster.yaml
      # extraPortMappings. This allows the host controller and Prometheus to scrape
      # http://localhost:30080/metrics directly.
      nodePort: 30080
