kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: kube-ai
nodes:
  - role: control-plane
    extraPortMappings:
      # Expose mock-vllm NodePort 30080 → host port 30080 so the host controller
      # and Prometheus can scrape http://localhost:30080/metrics directly.
      - containerPort: 30080
        hostPort: 30080
        protocol: TCP
